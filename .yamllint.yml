# YAML Lint Configuration for w3af

extends: default

rules:
  # Disable for better compatibility
  comments:
    require-starting-space: false
  
  # Line length
  line-length:
    max: 120
    level: warning
  
  # Indentation
  indentation:
    spaces: 2
    consistent: false
  
  # Key ordering
  key-duplicates: enable
  new-line-at-end-of-file: enable
  
  # Disable some strict rules for flexibility
  trailing-spaces: level: warning
  new-lines: type: unix

# Ignore certain files
ignore: |
  venv/
  .venv/
  build/
  dist/
  .git/
  node_modules/