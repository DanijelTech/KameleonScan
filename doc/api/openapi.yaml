{
  "openapi": "3.0.3",
  "info": {
    "title": "w3af REST API",
    "description": "Web Application Attack and Audit Framework - REST API for automated security scanning",
    "version": "2.0.0",
    "contact": {
      "name": "w3af Support",
      "email": "info@w3af.org",
      "url": "https://w3af.org"
    },
    "license": {
      "name": "GPL-2.0",
      "url": "https://www.gnu.org/licenses/gpl-2.0.txt"
    }
  },
  "servers": [
    {
      "url": "http://localhost:44444",
      "description": "w3af API Server"
    }
  ],
  "tags": [
    {
      "name": "Scans",
      "description": "Security scan operations"
    },
    {
      "name": "Targets",
      "description": "Target management"
    },
    {
      "name": "Profiles",
      "description": "Scan profile management"
    },
    {
      "name": "Plugins",
      "description": "Plugin management"
    },
    {
      "name": "KB",
      "description": "Knowledge Base - vulnerability storage"
    },
    {
      "name": "Reports",
      "description": "Report generation"
    }
  ],
  "paths": {
    "/scan": {
      "post": {
        "tags": ["Scans"],
        "summary": "Start a new scan",
        "description": "Initiates a new security scan with specified target and profile",
        "operationId": "startScan",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "required": ["target", "profile"],
                "properties": {
                  "target": {
                    "type": "string",
                    "description": "Target URL to scan",
                    "example": "http://example.com"
                  },
                  "profile": {
                    "type": "string",
                    "description": "Scan profile name",
                    "example": "fast_scan"
                  }
                }
              }
            }
          }
        },
        "responses": {
          "202": {
            "description": "Scan started successfully",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "scan_id": {
                      "type": "string",
                      "description": "Unique scan identifier"
                    },
                    "status": {
                      "type": "string",
                      "enum": ["starting", "running", "paused", "stopped", "finished"]
                    }
                  }
                }
              }
            }
          }
        }
      }
    },
    "/scan/{scan_id}": {
      "get": {
        "tags": ["Scans"],
        "summary": "Get scan status",
        "operationId": "getScanStatus",
        "parameters": [
          {
            "name": "scan_id",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Scan status retrieved",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "scan_id": {"type": "string"},
                    "status": {"type": "string"},
                    "start_time": {"type": "string", "format": "date-time"},
                    "end_time": {"type": "string", "format": "date-time"},
                    "progress": {"type": "integer"}
                  }
                }
              }
            }
          }
        }
      },
      "delete": {
        "tags": ["Scans"],
        "summary": "Stop a scan",
        "operationId": "stopScan",
        "parameters": [
          {
            "name": "scan_id",
            "in": "path",
            "required": true,
            "schema": {"type": "string"}
          }
        ],
        "responses": {
          "204": {"description": "Scan stopped"}
        }
      }
    },
    "/scan/{scan_id}/pause": {
      "post": {
        "tags": ["Scans"],
        "summary": "Pause a running scan"
      }
    },
    "/scan/{scan_id}/resume": {
      "post": {
        "tags": ["Scans"],
        "summary": "Resume a paused scan"
      }
    },
    "/kb": {
      "get": {
        "tags": ["KB"],
        "summary": "Get all findings",
        "description": "Retrieve all vulnerability findings from the knowledge base",
        "responses": {
          "200": {
            "description": "List of vulnerabilities",
            "content": {
              "application/json": {
                "schema": {
                  "type": "array",
                  "items": {
                    "type": "object",
                    "properties": {
                      "id": {"type": "string"},
                      "name": {"type": "string"},
                      "severity": {"type": "string", "enum": ["INFO", "LOW", "MEDIUM", "HIGH", "CRITICAL"]},
                      "url": {"type": "string"},
                      "description": {"type": "string"}
                    }
                  }
                }
              }
            }
          }
        }
      }
    },
    "/profiles": {
      "get": {
        "tags": ["Profiles"],
        "summary": "List available profiles",
        "responses": {
          "200": {
            "description": "List of scan profiles",
            "content": {
              "application/json": {
                "schema": {
                  "type": "array",
                  "items": {
                    "type": "object",
                    "properties": {
                      "name": {"type": "string"},
                      "description": {"type": "string"},
                      "plugins": {"type": "array", "items": {"type": "string"}}
                    }
                  }
                }
              }
            }
          }
        }
      }
    },
    "/plugins": {
      "get": {
        "tags": ["Plugins"],
        "summary": "List all plugins",
        "parameters": [
          {
            "name": "type",
            "in": "query",
            "schema": {
              "type": "string",
              "enum": ["audit", "crawl", "grep", "attack", "output", "mangle"]
            }
          }
        ],
        "responses": {
          "200": {
            "description": "List of plugins"
          }
        }
      }
    },
    "/reports": {
      "post": {
        "tags": ["Reports"],
        "summary": "Generate a report",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "properties": {
                  "format": {
                    "type": "string",
                    "enum": ["html", "json", "xml", "csv", "txt"]
                  },
                  "output_file": {"type": "string"}
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Report generated",
            "content": {
              "application/octet-stream": {}
            }
          }
        }
      }
    }
  }
}