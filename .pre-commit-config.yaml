# Pre-commit hooks configuration for w3af
# Install: pip install pre-commit && pre-commit install

repos:
  # Python code formatting and linting
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        args: [--line-length=100]
        language_version: python3

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=100]

  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: [
          '--max-line-length=100',
          '--extend-ignore=E203,W503',
          '--select=E9,F63,F7,F82',  # Only critical errors in CI
        ]

  # Type checking
  - repo: https://github.com/python/mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --warn-unused-configs]
        language_version: python3.11

  # Security scanning
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        args: [-r, w3af/]
        files: ^w3af/

  # Check for secrets
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.7.0
    hooks:
      - id: trufflehog
        args: [--regex]

  # Remove trailing whitespace
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=10000']
      - id: check-merge-conflict
      - id: check-toml
      - id: debug-statements
      - id: mixed-line-ending

  # Dockerfile linting
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint

  # Markdown linting
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.13.1
    hooks:
      - id: markdownlint2

  # YAML linting
  - repo: https://github.com/pre-commit/mirrors-yamllint
    rev: v1.33.0
    hooks:
      - id: yamllint
        args: [--format, '{.basedir}/.yamllint.yml']

  # Git-specific hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-merge-conflict
      - id: forbid-new-submodules

# Exclude paths
exclude: |
  (?x)(
    ^w3af/core/data/parsers/tests/data/ |
    ^w3af/plugins/tests/crawl/ |
    ^w3af/plugins/tests/grep/data/ |
    ^\.git/
  )

# Stages
default_stages:
  - pre-commit

# All hooks must pass for commit to succeed
fail_fast: false